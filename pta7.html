<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTA 7: Browser City</title>
<style>
  :root {
    --bg: #0a0e1a;
    --road: #2a2e3a;
    --road-line: #f4d03f;
    --grass: #1e3a2f;
    --building-1: #3d2e4e;
    --building-2: #2e3d4e;
    --building-3: #4e3d2e;
    --building-4: #4e2e3d;
    --neon-pink: #ff2e88;
    --neon-cyan: #00f0ff;
    --player: #ff2e88;
    --hud: #f4d03f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #game {
    display: block;
    background: var(--grass);
    cursor: crosshair;
    width: 100vw;
    height: 100vh;
  }
  #hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    pointer-events: none;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  }
  #hud .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; }
  #hud .label { color: var(--neon-cyan); letter-spacing: 2px; font-weight: bold; }
  #hud .value { color: var(--hud); font-weight: bold; font-size: 18px; }
  #stars { color: #ff2e2e; letter-spacing: 4px; font-size: 22px; }
  #title {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    text-align: right;
    text-shadow: 3px 3px 0 var(--neon-pink);
    font-weight: bold;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--neon-cyan);
    pointer-events: none;
  }
  #title .sub { font-size: 10px; letter-spacing: 2px; color: #fff; text-shadow: 1px 1px 0 #000; margin-top: 4px;}
  #controls {
    position: fixed;
    bottom: 16px;
    left: 16px;
    z-index: 10;
    font-size: 11px;
    line-height: 1.6;
    background: rgba(0,0,0,0.5);
    padding: 10px 14px;
    border-left: 3px solid var(--neon-pink);
    letter-spacing: 1px;
    pointer-events: none;
  }
  #controls .k { color: var(--hud); font-weight: bold; }
  #msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    z-index: 20;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 6px;
    color: var(--neon-pink);
    text-shadow: 4px 4px 0 #000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    text-align: center;
  }
  #msg.show { opacity: 1; }
  #minimap {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 160px;
    height: 160px;
    background: rgba(0,0,0,0.6);
    border: 2px solid var(--neon-cyan);
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="minimap"></canvas>
<div id="title">PTA 7<div class="sub">BROWSER CITY // 1997</div></div>
<div id="hud">
  <div class="row"><span class="label">CASH</span><span class="value" id="cash">$0</span></div>
  <div class="row"><span class="label">KILLS</span><span class="value" id="kills">0</span></div>
  <div class="row"><span class="label">WANTED</span><span id="stars">☆☆☆☆☆</span></div>
  <div class="row"><span class="label">HEALTH</span><span class="value" id="health">100</span></div>
</div>
<div id="controls">
  <div><span class="k">WASD / Arrows</span> — Move / Drive</div>
  <div><span class="k">E</span> — Enter/Exit vehicle</div>
  <div><span class="k">SPACE</span> — Shoot / Punch</div>
  <div><span class="k">SHIFT</span> — Run</div>
  <div><span class="k">R</span> — Respawn</div>
</div>
<div id="msg"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');
mini.width = 160; mini.height = 160;

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

// ---------- WORLD ----------
const WORLD = 3000;
const BLOCK = 300;
const ROAD_W = 60;

// Generate buildings in blocks
const buildings = [];
const buildingColors = ['#3d2e4e','#2e3d4e','#4e3d2e','#4e2e3d','#2e4e3d','#3d4e2e'];
for (let bx = 0; bx < WORLD; bx += BLOCK) {
  for (let by = 0; by < WORLD; by += BLOCK) {
    // Leave road gaps
    const pad = ROAD_W/2 + 10;
    const innerX = bx + pad;
    const innerY = by + pad;
    const innerSize = BLOCK - pad*2;
    // Subdivide into 2-4 buildings per block
    const n = 2 + Math.floor(Math.random()*3);
    for (let i = 0; i < n; i++) {
      const bw = 40 + Math.random()*(innerSize/2);
      const bh = 40 + Math.random()*(innerSize/2);
      const x = innerX + Math.random()*(innerSize - bw);
      const y = innerY + Math.random()*(innerSize - bh);
      buildings.push({
        x, y, w: bw, h: bh,
        color: buildingColors[Math.floor(Math.random()*buildingColors.length)],
        roof: Math.random() > 0.5
      });
    }
  }
}

function isOnRoad(x, y) {
  const mx = x % BLOCK;
  const my = y % BLOCK;
  return mx < ROAD_W || mx > BLOCK - ROAD_W || my < ROAD_W || my > BLOCK - ROAD_W;
}

function collidesBuilding(x, y, r) {
  for (const b of buildings) {
    if (x + r > b.x && x - r < b.x + b.w && y + r > b.y && y - r < b.y + b.h) return b;
  }
  return null;
}

// ---------- PLAYER ----------
const player = {
  x: BLOCK + ROAD_W/2,
  y: BLOCK + ROAD_W/2,
  r: 8,
  angle: 0,
  speed: 0,
  inCar: null,
  health: 100,
  cash: 0,
  kills: 0,
  wanted: 0,
  shootCooldown: 0,
  dead: false,
  respawnTimer: 0
};

// ---------- VEHICLES ----------
const vehicles = [];
const carColors = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#ecf0f1','#34495e'];
for (let i = 0; i < 40; i++) {
  let x, y, tries = 0;
  do {
    x = Math.random() * WORLD;
    y = Math.random() * WORLD;
    tries++;
  } while ((!isOnRoad(x, y) || collidesBuilding(x, y, 20)) && tries < 50);
  vehicles.push({
    x, y, w: 30, h: 16, angle: Math.random()*Math.PI*2,
    speed: 0, maxSpeed: 6 + Math.random()*3,
    color: carColors[Math.floor(Math.random()*carColors.length)],
    driver: null, wrecked: false, health: 100,
    ai: true,
    turnTimer: 0
  });
}

// ---------- PEDESTRIANS ----------
const peds = [];
const pedColors = ['#f4a261','#e76f51','#2a9d8f','#e9c46a','#264653','#f08080','#87ceeb','#dda0dd'];
for (let i = 0; i < 60; i++) {
  let x, y, tries = 0;
  do { x = Math.random()*WORLD; y = Math.random()*WORLD; tries++; }
  while (collidesBuilding(x, y, 6) && tries < 30);
  peds.push({
    x, y, r: 6, angle: Math.random()*Math.PI*2,
    color: pedColors[Math.floor(Math.random()*pedColors.length)],
    skin: Math.random() > 0.5 ? '#f5d0a9' : '#c88b5e',
    vx: 0, vy: 0, state: 'walk', walkTimer: 0,
    dead: false, fleeing: false
  });
}

// ---------- COPS ----------
const cops = [];
const bullets = [];
const particles = [];
const pickups = [];

// ---------- INPUT ----------
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (['w','a','s','d',' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ---------- MESSAGES ----------
const msgEl = document.getElementById('msg');
let msgTimer = 0;
function showMsg(text, dur=90) {
  msgEl.textContent = text;
  msgEl.classList.add('show');
  msgTimer = dur;
}

// ---------- HUD ----------
function updateHUD() {
  document.getElementById('cash').textContent = '$' + player.cash;
  document.getElementById('kills').textContent = player.kills;
  document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
  const stars = '★'.repeat(player.wanted) + '☆'.repeat(5 - player.wanted);
  document.getElementById('stars').textContent = stars;
}

// ---------- PARTICLES ----------
function spawnBlood(x, y, n=12) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2;
    const s = 1 + Math.random()*3;
    particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 20+Math.random()*20, color: '#aa0000', r: 2+Math.random()*2});
  }
}
function spawnExplosion(x, y) {
  for (let i = 0; i < 40; i++) {
    const a = Math.random()*Math.PI*2;
    const s = 2 + Math.random()*6;
    particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 30+Math.random()*30, color: Math.random()>0.5?'#ff6600':'#ffcc00', r: 3+Math.random()*4});
  }
}
function spawnSpark(x, y) {
  for (let i = 0; i < 4; i++) {
    const a = Math.random()*Math.PI*2;
    particles.push({x, y, vx: Math.cos(a)*2, vy: Math.sin(a)*2, life: 10, color: '#ffff00', r: 1.5});
  }
}

// ---------- WANTED ----------
function addWanted(n) {
  player.wanted = Math.min(5, player.wanted + n);
}

// ---------- SHOOTING ----------
function shoot() {
  if (player.shootCooldown > 0) return;
  const px = player.inCar ? player.inCar.x : player.x;
  const py = player.inCar ? player.inCar.y : player.y;
  const pa = player.inCar ? player.inCar.angle : player.angle;
  bullets.push({
    x: px + Math.cos(pa)*20,
    y: py + Math.sin(pa)*20,
    vx: Math.cos(pa)*14,
    vy: Math.sin(pa)*14,
    life: 60,
    from: 'player'
  });
  player.shootCooldown = 8;
  addWanted(0); // shooting alone isn't crime, killing is
}

// ---------- COP SPAWN ----------
function spawnCop() {
  const cx = player.x + (Math.random()-0.5)*2000;
  const cy = player.y + (Math.random()-0.5)*2000;
  cops.push({
    x: cx, y: cy, r: 7, angle: 0,
    color: '#1a1a6e', skin: '#f5d0a9',
    speed: 2.2, shootCooldown: 0, health: 60, dead: false
  });
}

// ---------- UPDATE ----------
function update() {
  if (player.dead) {
    player.respawnTimer--;
    if (keys['r'] || player.respawnTimer <= 0) respawn();
    updateParticles();
    return;
  }

  if (player.shootCooldown > 0) player.shootCooldown--;
  if (msgTimer > 0) { msgTimer--; if (msgTimer === 0) msgEl.classList.remove('show'); }

  // Enter/exit
  if (keys['e']) {
    keys['e'] = false;
    if (player.inCar) {
      // exit
      const c = player.inCar;
      player.x = c.x + Math.cos(c.angle + Math.PI/2)*20;
      player.y = c.y + Math.sin(c.angle + Math.PI/2)*20;
      player.angle = c.angle;
      c.driver = null;
      c.ai = false;
      c.speed *= 0.3;
      player.inCar = null;
    } else {
      // find nearest car
      for (const v of vehicles) {
        if (v.wrecked) continue;
        const dx = v.x - player.x, dy = v.y - player.y;
        if (dx*dx + dy*dy < 40*40) {
          if (v.ai && Math.random() < 0.3) addWanted(1); // grand theft
          v.driver = 'player';
          v.ai = false;
          player.inCar = v;
          showMsg('PRETTY THEFT AUTO', 45);
          break;
        }
      }
    }
  }

  // Movement
  if (player.inCar) {
    const c = player.inCar;
    const accel = (keys['w']||keys['arrowup']) ? 0.25 : (keys['s']||keys['arrowdown']) ? -0.2 : 0;
    c.speed += accel;
    c.speed *= 0.97;
    c.speed = Math.max(-5, Math.min(10, c.speed));
    const turn = (keys['a']||keys['arrowleft']) ? -0.04 : (keys['d']||keys['arrowright']) ? 0.04 : 0;
    c.angle += turn * (c.speed/8);
    const nx = c.x + Math.cos(c.angle)*c.speed;
    const ny = c.y + Math.sin(c.angle)*c.speed;
    const b = collidesBuilding(nx, ny, 16);
    if (b) {
      // crash
      c.speed *= -0.3;
      c.health -= Math.abs(c.speed)*2;
      spawnSpark(nx, ny);
    } else {
      c.x = nx; c.y = ny;
    }
    // Run over peds
    for (const p of peds) {
      if (p.dead) continue;
      const dx = p.x - c.x, dy = p.y - c.y;
      if (dx*dx + dy*dy < 20*20 && Math.abs(c.speed) > 2) {
        p.dead = true;
        player.kills++;
        player.cash += 50;
        addWanted(1);
        spawnBlood(p.x, p.y, 20);
        showMsg('HIT AND RUN +$50', 45);
        // panic nearby peds
        for (const q of peds) {
          if (q.dead) continue;
          const ddx = q.x - p.x, ddy = q.y - p.y;
          if (ddx*ddx + ddy*ddy < 200*200) q.fleeing = true;
        }
      }
    }
    // Ram cops
    for (const cop of cops) {
      if (cop.dead) continue;
      const dx = cop.x - c.x, dy = cop.y - c.y;
      if (dx*dx + dy*dy < 20*20 && Math.abs(c.speed) > 2) {
        cop.dead = true;
        player.kills++;
        player.cash += 100;
        addWanted(1);
        spawnBlood(cop.x, cop.y, 20);
      }
    }
    // car explodes
    if (c.health <= 0) {
      spawnExplosion(c.x, c.y);
      c.wrecked = true;
      player.inCar = null;
      player.x = c.x; player.y = c.y;
      player.health -= 40;
      showMsg('VEHICLE DESTROYED', 60);
      if (player.health <= 0) die();
    }
    player.x = c.x; player.y = c.y;
    player.angle = c.angle;
  } else {
    const spd = keys['shift'] ? 3.2 : 2;
    let dx = 0, dy = 0;
    if (keys['w']||keys['arrowup']) dy -= 1;
    if (keys['s']||keys['arrowdown']) dy += 1;
    if (keys['a']||keys['arrowleft']) dx -= 1;
    if (keys['d']||keys['arrowright']) dx += 1;
    if (dx || dy) {
      const l = Math.hypot(dx, dy);
      dx /= l; dy /= l;
      player.angle = Math.atan2(dy, dx);
      const nx = player.x + dx*spd;
      const ny = player.y + dy*spd;
      if (!collidesBuilding(nx, ny, player.r)) { player.x = nx; player.y = ny; }
      else if (!collidesBuilding(nx, player.y, player.r)) player.x = nx;
      else if (!collidesBuilding(player.x, ny, player.r)) player.y = ny;
    }
  }

  // Clamp to world
  player.x = Math.max(0, Math.min(WORLD, player.x));
  player.y = Math.max(0, Math.min(WORLD, player.y));
  if (player.inCar) { player.inCar.x = player.x; player.inCar.y = player.y; }

  // Shoot
  if (keys[' ']) shoot();

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || collidesBuilding(b.x, b.y, 2)) { bullets.splice(i,1); continue; }
    if (b.from === 'player') {
      let hit = false;
      for (const p of peds) {
        if (p.dead) continue;
        const dx = p.x - b.x, dy = p.y - b.y;
        if (dx*dx + dy*dy < 64) {
          p.dead = true;
          player.kills++;
          player.cash += 50;
          addWanted(1);
          spawnBlood(p.x, p.y);
          for (const q of peds) {
            if (q.dead) continue;
            const ddx = q.x - p.x, ddy = q.y - p.y;
            if (ddx*ddx + ddy*ddy < 300*300) q.fleeing = true;
          }
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
      for (const cop of cops) {
        if (cop.dead) continue;
        const dx = cop.x - b.x, dy = cop.y - b.y;
        if (dx*dx + dy*dy < 64) {
          cop.health -= 25;
          spawnBlood(cop.x, cop.y, 4);
          if (cop.health <= 0) { cop.dead = true; player.kills++; player.cash += 100; addWanted(1); spawnBlood(cop.x, cop.y, 20); }
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
      for (const v of vehicles) {
        if (v.wrecked) continue;
        const dx = v.x - b.x, dy = v.y - b.y;
        if (dx*dx + dy*dy < 400) {
          v.health -= 10;
          spawnSpark(b.x, b.y);
          if (v.health <= 0) { spawnExplosion(v.x, v.y); v.wrecked = true; }
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
    } else {
      const dx = player.x - b.x, dy = player.y - b.y;
      if (dx*dx + dy*dy < 80) {
        player.health -= 10;
        spawnBlood(player.x, player.y, 3);
        bullets.splice(i,1);
        if (player.health <= 0) die();
        continue;
      }
    }
  }

  // Peds AI
  for (const p of peds) {
    if (p.dead) continue;
    p.walkTimer--;
    if (p.fleeing) {
      const dx = p.x - player.x, dy = p.y - player.y;
      const d = Math.hypot(dx, dy) || 1;
      p.vx = (dx/d)*2; p.vy = (dy/d)*2;
      p.angle = Math.atan2(p.vy, p.vx);
    } else if (p.walkTimer <= 0) {
      p.angle = Math.random()*Math.PI*2;
      p.vx = Math.cos(p.angle)*0.6;
      p.vy = Math.sin(p.angle)*0.6;
      p.walkTimer = 60 + Math.random()*120;
    }
    const nx = p.x + p.vx, ny = p.y + p.vy;
    if (!collidesBuilding(nx, ny, p.r)) { p.x = nx; p.y = ny; }
    else p.walkTimer = 0;
  }

  // Vehicles AI
  for (const v of vehicles) {
    if (v.wrecked || !v.ai) continue;
    v.turnTimer--;
    if (v.turnTimer <= 0) {
      // stay on road
      if (!isOnRoad(v.x, v.y)) v.angle += Math.PI/2;
      else if (Math.random() < 0.1) v.angle += (Math.random()-0.5)*1.5;
      v.turnTimer = 30 + Math.random()*60;
    }
    v.speed = Math.min(v.maxSpeed, v.speed + 0.1);
    const nx = v.x + Math.cos(v.angle)*v.speed;
    const ny = v.y + Math.sin(v.angle)*v.speed;
    if (collidesBuilding(nx, ny, 16)) {
      v.angle += Math.PI/2 + (Math.random()-0.5);
      v.speed *= 0.3;
    } else { v.x = nx; v.y = ny; }
  }

  // Cops spawn
  if (player.wanted > 0) {
    const targetCops = player.wanted * 2;
    const alive = cops.filter(c=>!c.dead).length;
    if (alive < targetCops && Math.random() < 0.02*player.wanted) spawnCop();
  }
  // Cops AI
  for (const cop of cops) {
    if (cop.dead) continue;
    const dx = player.x - cop.x, dy = player.y - cop.y;
    const d = Math.hypot(dx, dy) || 1;
    cop.angle = Math.atan2(dy, dx);
    if (d > 120) {
      const nx = cop.x + (dx/d)*cop.speed;
      const ny = cop.y + (dy/d)*cop.speed;
      if (!collidesBuilding(nx, ny, cop.r)) { cop.x = nx; cop.y = ny; }
      else { cop.x += (dx/d)*cop.speed*0.3; cop.y += (dy/d)*cop.speed*0.3; }
    } else {
      cop.shootCooldown--;
      if (cop.shootCooldown <= 0) {
        bullets.push({
          x: cop.x + Math.cos(cop.angle)*10,
          y: cop.y + Math.sin(cop.angle)*10,
          vx: Math.cos(cop.angle)*10 + (Math.random()-0.5)*2,
          vy: Math.sin(cop.angle)*10 + (Math.random()-0.5)*2,
          life: 50, from: 'cop'
        });
        cop.shootCooldown = 40;
      }
    }
  }

  // Wanted cooldown (if not committing crime)
  if (player.wanted > 0 && Math.random() < 0.0008) player.wanted--;

  updateParticles();
  updateHUD();
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function die() {
  player.dead = true;
  player.respawnTimer = 120;
  showMsg('WASTED', 300);
}
function respawn() {
  player.dead = false;
  player.health = 100;
  player.wanted = 0;
  player.x = BLOCK + ROAD_W/2;
  player.y = BLOCK + ROAD_W/2;
  player.inCar = null;
  cops.length = 0;
  msgEl.classList.remove('show');
}

// ---------- RENDER ----------
function render() {
  ctx.fillStyle = '#1e3a2f';
  ctx.fillRect(0,0,W,H);

  const camX = player.x - W/2;
  const camY = player.y - H/2;
  ctx.save();
  ctx.translate(-camX, -camY);

  // Roads — draw dark bands over grass
  ctx.fillStyle = '#2a2e3a';
  const startBX = Math.floor(camX / BLOCK) * BLOCK;
  const startBY = Math.floor(camY / BLOCK) * BLOCK;
  for (let x = startBX; x < camX + W + BLOCK; x += BLOCK) {
    ctx.fillRect(x - ROAD_W/2, camY - 20, ROAD_W, H + 40);
  }
  for (let y = startBY; y < camY + H + BLOCK; y += BLOCK) {
    ctx.fillRect(camX - 20, y - ROAD_W/2, W + 40, ROAD_W);
  }
  // Road lines
  ctx.strokeStyle = '#f4d03f';
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 16]);
  for (let x = startBX; x < camX + W + BLOCK; x += BLOCK) {
    ctx.beginPath(); ctx.moveTo(x, camY - 20); ctx.lineTo(x, camY + H + 20); ctx.stroke();
  }
  for (let y = startBY; y < camY + H + BLOCK; y += BLOCK) {
    ctx.beginPath(); ctx.moveTo(camX - 20, y); ctx.lineTo(camX + W + 20, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // Buildings
  for (const b of buildings) {
    if (b.x + b.w < camX || b.x > camX + W || b.y + b.h < camY || b.y > camY + H) continue;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(b.x + 4, b.y + 4, b.w, b.h);
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // windows
    ctx.fillStyle = 'rgba(255,230,150,0.5)';
    for (let wy = b.y + 6; wy < b.y + b.h - 4; wy += 10) {
      for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 10) {
        if (Math.random() < 0.001) {} // deterministic-ish
        if (((wx+wy)^(b.x|0))%3 === 0) ctx.fillRect(wx, wy, 4, 4);
      }
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  }

  // Blood/wreck ground stains
  for (const p of peds) {
    if (!p.dead) continue;
    if (p.x < camX-10 || p.x > camX+W+10 || p.y < camY-10 || p.y > camY+H+10) continue;
    ctx.fillStyle = '#660000';
    ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-4, p.y-4, 8, 8);
  }
  for (const v of vehicles) {
    if (!v.wrecked) continue;
    if (v.x < camX-30 || v.x > camX+W+30 || v.y < camY-30 || v.y > camY+H+30) continue;
    ctx.save();
    ctx.translate(v.x, v.y); ctx.rotate(v.angle);
    ctx.fillStyle = '#333'; ctx.fillRect(-v.w/2, -v.h/2, v.w, v.h);
    ctx.fillStyle = '#000';
    for (let i = 0; i < 5; i++) ctx.fillRect(-v.w/2 + i*6, -v.h/2 + (i%2)*6, 4, 4);
    ctx.restore();
  }

  // Live vehicles
  for (const v of vehicles) {
    if (v.wrecked) continue;
    if (v.x < camX-40 || v.x > camX+W+40 || v.y < camY-40 || v.y > camY+H+40) continue;
    ctx.save();
    ctx.translate(v.x, v.y); ctx.rotate(v.angle);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(-v.w/2 + 2, -v.h/2 + 2, v.w, v.h);
    ctx.fillStyle = v.color;
    ctx.fillRect(-v.w/2, -v.h/2, v.w, v.h);
    // windshield
    ctx.fillStyle = 'rgba(100,180,220,0.7)';
    ctx.fillRect(2, -v.h/2+2, 8, v.h-4);
    // outline
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.strokeRect(-v.w/2, -v.h/2, v.w, v.h);
    ctx.restore();
  }

  // Pedestrians
  for (const p of peds) {
    if (p.dead) continue;
    if (p.x < camX-10 || p.x > camX+W+10 || p.y < camY-10 || p.y > camY+H+10) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(p.x+1, p.y+1, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.skin;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r-3, 0, Math.PI*2); ctx.fill();
  }

  // Cops
  for (const cop of cops) {
    if (cop.dead) continue;
    if (cop.x < camX-20 || cop.x > camX+W+20 || cop.y < camY-20 || cop.y > camY+H+20) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(cop.x+1, cop.y+1, cop.r+1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = cop.color;
    ctx.beginPath(); ctx.arc(cop.x, cop.y, cop.r+1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = cop.skin;
    ctx.beginPath(); ctx.arc(cop.x, cop.y, cop.r-2, 0, Math.PI*2); ctx.fill();
    // badge flash
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(cop.x-1, cop.y-1, 2, 2);
  }

  // Player (on foot)
  if (!player.inCar) {
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(1,1,player.r+1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff2e88';
    ctx.beginPath(); ctx.arc(0,0,player.r+1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath(); ctx.arc(0,0,player.r-2,0,Math.PI*2); ctx.fill();
    // gun direction
    ctx.fillStyle = '#111';
    ctx.fillRect(4, -2, 10, 4);
    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    ctx.fillStyle = b.from === 'player' ? '#ffff66' : '#ff6666';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2); ctx.fill();
  }

  // Particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life/40);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Vignette
  const g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)/3, W/2, H/2, Math.max(W,H)/1.2);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Minimap
  mctx.fillStyle = '#000';
  mctx.fillRect(0,0,160,160);
  const scale = 160 / WORLD;
  mctx.fillStyle = '#3a3a4a';
  for (let x = 0; x < WORLD; x += BLOCK) mctx.fillRect(x*scale, 0, ROAD_W*scale, 160);
  for (let y = 0; y < WORLD; y += BLOCK) mctx.fillRect(0, y*scale, 160, ROAD_W*scale);
  for (const cop of cops) { if (!cop.dead) { mctx.fillStyle = '#00f0ff'; mctx.fillRect(cop.x*scale-1, cop.y*scale-1, 3, 3); } }
  mctx.fillStyle = '#ff2e88';
  mctx.fillRect(player.x*scale-2, player.y*scale-2, 4, 4);
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

showMsg('WELCOME TO BROWSER CITY', 120);
loop();
</script>
</body>
</html>
