<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTA 7: Browser City</title>
<style>
  :root {
    --bg: #0a0e1a; --road: #2a2e3a; --road-line: #f4d03f; --grass: #1e3a2f;
    --neon-pink: #ff2e88; --neon-cyan: #00f0ff; --neon-purple: #b967ff; --hud: #f4d03f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace;
    overflow: hidden; height: 100vh; width: 100vw; }
  #game { display: block; background: var(--grass); cursor: crosshair; width: 100vw; height: 100vh; }
  .pane { position: fixed; z-index: 10; pointer-events: none;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
  #hud { top: 16px; left: 16px; }
  #hud .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; }
  #hud .label { color: var(--neon-cyan); letter-spacing: 2px; font-weight: bold; }
  #hud .value { color: var(--hud); font-weight: bold; font-size: 18px; }
  #stars { color: #ff2e2e; letter-spacing: 4px; font-size: 22px; }
  #weapon { color: var(--neon-purple); font-weight: bold; }
  #title { top: 16px; right: 16px; text-align: right;
    text-shadow: 3px 3px 0 var(--neon-pink); font-weight: bold; font-size: 28px;
    letter-spacing: 4px; color: var(--neon-cyan); }
  #title .sub { font-size: 10px; letter-spacing: 2px; color: #fff; text-shadow: 1px 1px 0 #000; margin-top: 4px; }
  #controls { bottom: 16px; left: 16px; font-size: 11px; line-height: 1.6;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-left: 3px solid var(--neon-pink); letter-spacing: 1px; }
  #controls .k { color: var(--hud); font-weight: bold; }
  #mission { top: 90px; right: 16px; max-width: 280px;
    background: rgba(0,0,0,0.6); padding: 10px 14px; border-left: 3px solid var(--neon-cyan);
    font-size: 12px; line-height: 1.5; letter-spacing: 1px; display: none; }
  #mission.show { display: block; }
  #mission .mt { color: var(--neon-cyan); font-weight: bold; font-size: 13px; margin-bottom: 4px; letter-spacing: 2px; }
  #mission .md { color: #fff; }
  #mission .mr { color: var(--hud); margin-top: 6px; font-weight: bold; }
  #msg { top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 42px;
    font-weight: bold; letter-spacing: 6px; color: var(--neon-pink);
    text-shadow: 4px 4px 0 #000; opacity: 0; transition: opacity 0.3s; text-align: center; }
  #msg.show { opacity: 1; }
  #msg.success { color: #6effb2; }
  #msg.fail { color: #ff3e3e; }
  #minimap { position: fixed; bottom: 16px; right: 16px; width: 160px; height: 160px;
    background: rgba(0,0,0,0.6); border: 2px solid var(--neon-cyan); z-index: 10; }
  #audio-toggles { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 20; }
  .audio-btn { background: rgba(0,0,0,0.6); color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
    padding: 6px 14px; font-family: 'Courier New', monospace; font-size: 11px;
    letter-spacing: 2px; cursor: pointer; }
  .audio-btn:hover { background: var(--neon-cyan); color: #000; }
  .audio-btn.on { background: var(--neon-cyan); color: #000; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="minimap"></canvas>
<div id="audio-toggles">
  <button class="audio-btn" id="music-toggle">♪ MUSIC: OFF</button>
  <button class="audio-btn" id="sfx-toggle">✦ SFX: OFF</button>
</div>
<div id="title" class="pane">PTA 7<div class="sub">BROWSER CITY // 1997</div></div>
<div id="hud" class="pane">
  <div class="row"><span class="label">CASH</span><span class="value" id="cash">$0</span></div>
  <div class="row"><span class="label">KILLS</span><span class="value" id="kills">0</span></div>
  <div class="row"><span class="label">WANTED</span><span id="stars">☆☆☆☆☆</span></div>
  <div class="row"><span class="label">HEALTH</span><span class="value" id="health">100</span></div>
  <div class="row"><span class="label">ARMOR</span><span class="value" id="armor">0</span></div>
  <div class="row"><span class="label">WEAPON</span><span id="weapon">FIST</span></div>
  <div class="row"><span class="label">AMMO</span><span class="value" id="ammo">∞</span></div>
</div>
<div id="mission" class="pane">
  <div class="mt" id="mt">MISSION</div>
  <div class="md" id="md"></div>
  <div class="mr" id="mr"></div>
</div>
<div id="controls" class="pane">
  <div><span class="k">WASD / Arrows</span> — Move / Drive</div>
  <div><span class="k">E</span> — Enter/Exit vehicle</div>
  <div><span class="k">SPACE</span> — Attack</div>
  <div><span class="k">1-4</span> — Switch weapon</div>
  <div><span class="k">SHIFT</span> — Run</div>
  <div><span class="k">M</span> — Accept mission (pink ?)</div>
  <div><span class="k">R</span> — Respawn</div>
</div>
<div id="msg" class="pane"></div>

<script>
// ============ AUDIO ============
let musicOn = false, sfxOn = false, actx = null, masterGain, musicGain, sfxGain;
let musicStarted = false, musicLoopRunning = false;
let musicBarTime = 0, musicBeat = 0, musicScheduleBar = null;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.35; masterGain.connect(actx.destination);
  musicGain = actx.createGain(); musicGain.gain.value = 0.5; musicGain.connect(masterGain);
  sfxGain = actx.createGain(); sfxGain.gain.value = 0.7; sfxGain.connect(masterGain);
}
function startMusic() {
  const bpm = 110, beat = 60/bpm;
  const bassNotes = [55, 55, 82.4, 55, 73.4, 55, 65.4, 55];
  function scheduleBar(startTime) {
    bassNotes.forEach((f, i) => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'sawtooth'; o.frequency.value = f;
      const t = startTime + i*beat/2;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t+beat/2-0.02);
      const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 400;
      o.connect(filt); filt.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t+beat/2);
    });
    [220, 261.6, 329.6].forEach(f => {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0, startTime);
      g.gain.linearRampToValueAtTime(0.06, startTime+0.3);
      g.gain.linearRampToValueAtTime(0.04, startTime+beat*3);
      g.gain.linearRampToValueAtTime(0, startTime+beat*4);
      o.connect(g); g.connect(musicGain);
      o.start(startTime); o.stop(startTime+beat*4);
    });
    for (let i = 0; i < 8; i++) {
      const t = startTime + i*beat/2;
      const buf = actx.createBuffer(1, actx.sampleRate*0.05, actx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random()*2-1) * (1 - j/d.length);
      const s = actx.createBufferSource(); s.buffer = buf;
      const g = actx.createGain(); g.gain.value = i%2 ? 0.08 : 0.04;
      const hp = actx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 6000;
      s.connect(hp); hp.connect(g); g.connect(musicGain);
      s.start(t);
    }
  }
  musicBarTime = actx.currentTime + 0.1;
  musicBeat = beat;
  musicScheduleBar = scheduleBar;
  if (!musicLoopRunning) {
    musicLoopRunning = true;
    (function loop() {
      if (!musicOn) { musicLoopRunning = false; return; }
      while (musicBarTime < actx.currentTime + 1) { musicScheduleBar(musicBarTime); musicBarTime += musicBeat*4; }
      setTimeout(loop, 200);
    })();
  }
}
function sfxBeep(freq, dur, type='square', vol=0.2) {
  if (!sfxOn) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  const t = actx.currentTime;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+dur);
}
function sfxNoise(dur, vol=0.3, hp=200) {
  if (!sfxOn) return;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const s = actx.createBufferSource(); s.buffer = buf;
  const g = actx.createGain(); g.gain.value = vol;
  const f = actx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
  s.connect(f); f.connect(g); g.connect(sfxGain); s.start();
}
function sfxShoot() { sfxNoise(0.08, 0.4, 1500); sfxBeep(180, 0.05, 'square', 0.15); }
function sfxExplode() { sfxNoise(0.6, 0.6, 100); sfxBeep(60, 0.4, 'sawtooth', 0.3); }
function sfxPunch() { sfxBeep(120, 0.08, 'square', 0.2); }
function sfxPickup() { sfxBeep(800, 0.08, 'square', 0.2); setTimeout(()=>sfxBeep(1200, 0.08, 'square', 0.2), 80); }
function sfxSiren() {
  if (!sfxOn) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; g.gain.value = 0.08;
  const t = actx.currentTime;
  o.frequency.setValueAtTime(600, t);
  o.frequency.linearRampToValueAtTime(900, t+0.25);
  o.frequency.linearRampToValueAtTime(600, t+0.5);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+0.5);
}
document.getElementById('music-toggle').addEventListener('click', () => {
  initAudio();
  musicOn = !musicOn;
  const btn = document.getElementById('music-toggle');
  btn.textContent = musicOn ? '♪ MUSIC: ON' : '♪ MUSIC: OFF';
  btn.classList.toggle('on', musicOn);
  if (musicOn) { actx.resume(); startMusic(); }
});
document.getElementById('sfx-toggle').addEventListener('click', () => {
  initAudio();
  sfxOn = !sfxOn;
  const btn = document.getElementById('sfx-toggle');
  btn.textContent = sfxOn ? '✦ SFX: ON' : '✦ SFX: OFF';
  btn.classList.toggle('on', sfxOn);
  if (sfxOn) actx.resume();
});

// ============ GAME ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');
mini.width = 160; mini.height = 160;
let W = canvas.width = window.innerWidth, H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

const WORLD = 3000, BLOCK = 300, ROAD_W = 60;

const GANGS = [
  { name: 'NEON SNAKES',   color: '#ff2e88', tint: 'rgba(255,46,136,0.08)', bounds: [0, 0, 1500, 1500] },
  { name: 'CHROME KINGS',  color: '#00f0ff', tint: 'rgba(0,240,255,0.08)',  bounds: [1500, 0, 3000, 1500] },
  { name: 'VIOLET CARTEL', color: '#b967ff', tint: 'rgba(185,103,255,0.08)',bounds: [0, 1500, 1500, 3000] },
  { name: 'GOLD MAFIA',    color: '#f4d03f', tint: 'rgba(244,208,63,0.08)', bounds: [1500, 1500, 3000, 3000] },
];
function gangAt(x, y) {
  for (const g of GANGS) if (x >= g.bounds[0] && x < g.bounds[2] && y >= g.bounds[1] && y < g.bounds[3]) return g;
  return GANGS[0];
}

const buildings = [];
const buildingColors = ['#3d2e4e','#2e3d4e','#4e3d2e','#4e2e3d','#2e4e3d','#3d4e2e'];
for (let bx = 0; bx < WORLD; bx += BLOCK) {
  for (let by = 0; by < WORLD; by += BLOCK) {
    const pad = ROAD_W/2 + 10;
    const innerX = bx + pad, innerY = by + pad, innerSize = BLOCK - pad*2;
    const n = 2 + Math.floor(Math.random()*3);
    for (let i = 0; i < n; i++) {
      const bw = 40 + Math.random()*(innerSize/2);
      const bh = 40 + Math.random()*(innerSize/2);
      const x = innerX + Math.random()*(innerSize - bw);
      const y = innerY + Math.random()*(innerSize - bh);
      buildings.push({ x, y, w: bw, h: bh, color: buildingColors[Math.floor(Math.random()*buildingColors.length)] });
    }
  }
}
function isOnRoad(x, y) { const mx = x % BLOCK, my = y % BLOCK; return mx < ROAD_W || mx > BLOCK - ROAD_W || my < ROAD_W || my > BLOCK - ROAD_W; }
function collidesBuilding(x, y, r) {
  for (const b of buildings) if (x + r > b.x && x - r < b.x + b.w && y + r > b.y && y - r < b.y + b.h) return b;
  return null;
}

const WEAPONS = {
  fist:    { name: 'FIST',    ammo: Infinity, dmg: 15, range: 20, cooldown: 18, spread: 0, speed: 0, melee: true },
  pistol:  { name: 'PISTOL',  ammo: 40,       dmg: 20, cooldown: 14, spread: 0.05, speed: 14, life: 50 },
  smg:     { name: 'SMG',     ammo: 90,       dmg: 12, cooldown: 5,  spread: 0.12, speed: 16, life: 50 },
  shotgun: { name: 'SHOTGUN', ammo: 24,       dmg: 18, cooldown: 24, spread: 0.35, speed: 14, life: 35, pellets: 6 },
};

const player = {
  x: BLOCK + ROAD_W/2, y: BLOCK + ROAD_W/2, r: 8, angle: 0,
  inCar: null, health: 100, armor: 0, cash: 0, kills: 0, wanted: 0,
  weapon: 'fist', ammo: { fist: Infinity, pistol: 0, smg: 0, shotgun: 0 },
  attackCooldown: 0, dead: false, respawnTimer: 0, meleeFlash: 0
};

const vehicles = [];
const carColors = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#ecf0f1','#34495e'];
// Moving traffic
for (let i = 0; i < 25; i++) {
  let x, y, tries = 0;
  do { x = Math.random()*WORLD; y = Math.random()*WORLD; tries++; }
  while ((!isOnRoad(x, y) || collidesBuilding(x, y, 20)) && tries < 50);
  vehicles.push({ x, y, w: 30, h: 16, angle: Math.random()*Math.PI*2,
    speed: 0, maxSpeed: 6 + Math.random()*3,
    color: carColors[Math.floor(Math.random()*carColors.length)],
    driver: null, wrecked: false, health: 100, ai: true, parked: false, turnTimer: 0 });
}
// Parked cars: sit just inside the road along block edges, aligned with street flow
for (let i = 0; i < 50; i++) {
  let x, y, angle, tries = 0, ok = false;
  while (!ok && tries < 80) {
    tries++;
    // Pick a random block corner and an edge (N/S/E/W)
    const bx = Math.floor(Math.random() * (WORLD/BLOCK)) * BLOCK;
    const by = Math.floor(Math.random() * (WORLD/BLOCK)) * BLOCK;
    const edge = Math.floor(Math.random()*4);
    const along = 40 + Math.random()*(BLOCK - 80);
    if (edge === 0)      { x = bx + along;        y = by + ROAD_W/2 + 18; angle = 0; }            // top edge, horizontal road, park below road line
    else if (edge === 1) { x = bx + along;        y = by + BLOCK - ROAD_W/2 - 18; angle = Math.PI; } // bottom edge
    else if (edge === 2) { x = bx + ROAD_W/2 + 18; y = by + along;        angle = Math.PI/2; }    // left edge
    else                 { x = bx + BLOCK - ROAD_W/2 - 18; y = by + along; angle = -Math.PI/2; }  // right edge
    if (x < 20 || x > WORLD-20 || y < 20 || y > WORLD-20) continue;
    if (collidesBuilding(x, y, 18)) continue;
    // Also avoid stacking parked cars
    let clash = false;
    for (const v of vehicles) {
      const dx = v.x - x, dy = v.y - y;
      if (dx*dx + dy*dy < 50*50) { clash = true; break; }
    }
    if (clash) continue;
    ok = true;
  }
  if (!ok) continue;
  vehicles.push({ x, y, w: 30, h: 16, angle,
    speed: 0, maxSpeed: 6 + Math.random()*3,
    color: carColors[Math.floor(Math.random()*carColors.length)],
    driver: null, wrecked: false, health: 100, ai: false, parked: true, turnTimer: 0 });
}

const peds = [];
const pedColors = ['#f4a261','#e76f51','#2a9d8f','#e9c46a','#264653','#f08080','#87ceeb','#dda0dd'];
for (let i = 0; i < 80; i++) {
  let x, y, tries = 0;
  do { x = Math.random()*WORLD; y = Math.random()*WORLD; tries++; }
  while (collidesBuilding(x, y, 6) && tries < 30);
  const g = gangAt(x, y);
  const isGang = Math.random() < 0.25;
  peds.push({ x, y, r: 6, angle: Math.random()*Math.PI*2,
    color: isGang ? g.color : pedColors[Math.floor(Math.random()*pedColors.length)],
    skin: Math.random() > 0.5 ? '#f5d0a9' : '#c88b5e',
    vx: 0, vy: 0, walkTimer: 0, dead: false, fleeing: false,
    gang: isGang ? g : null, hostile: false, shootCooldown: 0, health: isGang ? 50 : 30 });
}

const cops = [], bullets = [], particles = [], pickups = [];

const pickupTypes = [
  { type: 'pistol',  color: '#ffffff', dropAmmo: 20 },
  { type: 'smg',     color: '#00f0ff', dropAmmo: 40 },
  { type: 'shotgun', color: '#ff8800', dropAmmo: 12 },
  { type: 'health',  color: '#6effb2' },
  { type: 'armor',   color: '#b967ff' },
  { type: 'cash',    color: '#f4d03f' },
];
for (let i = 0; i < 40; i++) {
  let x, y, tries = 0;
  do { x = Math.random()*WORLD; y = Math.random()*WORLD; tries++; }
  while (collidesBuilding(x, y, 10) && tries < 30);
  const t = pickupTypes[Math.floor(Math.random()*pickupTypes.length)];
  pickups.push({ x, y, ...t });
}

const missionGivers = [];
for (let i = 0; i < 6; i++) {
  let x, y, tries = 0;
  do { x = Math.random()*WORLD; y = Math.random()*WORLD; tries++; }
  while (collidesBuilding(x, y, 10) && tries < 30);
  missionGivers.push({ x, y, r: 10, active: true });
}

let activeMission = null;
const missionTypes = [
  { id: 'hit', title: 'CONTRACT KILL', make: () => {
    const g = GANGS[Math.floor(Math.random()*GANGS.length)];
    const tx = g.bounds[0]+100+Math.random()*(g.bounds[2]-g.bounds[0]-200);
    const ty = g.bounds[1]+100+Math.random()*(g.bounds[3]-g.bounds[1]-200);
    const mark = { x: tx, y: ty, r: 7, angle: 0, color: g.color, skin: '#f5d0a9',
      vx: 0, vy: 0, walkTimer: 0, dead: false, fleeing: false, gang: g, hostile: true,
      shootCooldown: 0, health: 100, mark: true };
    peds.push(mark);
    return { desc: `Eliminate the ${g.name} boss. Marked on minimap.`, reward: 500, target: mark, check: () => mark.dead };
  }},
  { id: 'delivery', title: 'PRETTY THEFT DELIVERY', make: () => {
    const dx = Math.random()*WORLD, dy = Math.random()*WORLD;
    return { desc: `Steal any car and deliver it to the marker. Don't wreck it.`, reward: 400,
      dropoff: { x: dx, y: dy },
      check: () => { if (!player.inCar || player.inCar.wrecked) return false;
        const dx2 = player.x - activeMission.dropoff.x, dy2 = player.y - activeMission.dropoff.y;
        return dx2*dx2 + dy2*dy2 < 40*40; } };
  }},
  { id: 'rampage', title: 'RAMPAGE', make: () => {
    const start = player.kills, need = 8;
    return { desc: `Kill ${need} people in 60 seconds. Go wild.`, reward: 600, timer: 60*60,
      check: () => player.kills - start >= need };
  }}
];

function tryAcceptMission() {
  if (activeMission) return;
  for (const m of missionGivers) {
    if (!m.active) continue;
    const dx = m.x - player.x, dy = m.y - player.y;
    if (dx*dx + dy*dy < 30*30) {
      const mt = missionTypes[Math.floor(Math.random()*missionTypes.length)];
      const data = mt.make();
      activeMission = { type: mt.id, title: mt.title, giver: m, ...data };
      m.active = false;
      showMission(); showMsg('MISSION STARTED', 60); sfxPickup();
      return;
    }
  }
}
function showMission() {
  const p = document.getElementById('mission');
  if (!activeMission) { p.classList.remove('show'); return; }
  p.classList.add('show');
  document.getElementById('mt').textContent = activeMission.title;
  document.getElementById('md').textContent = activeMission.desc;
  let rewardText = `REWARD: $${activeMission.reward}`;
  if (activeMission.timer !== undefined) rewardText += ` • TIME: ${Math.ceil(activeMission.timer/60)}s`;
  document.getElementById('mr').textContent = rewardText;
}
function completeMission() {
  player.cash += activeMission.reward;
  showMsg('MISSION PASSED', 120);
  document.getElementById('msg').classList.add('success');
  setTimeout(()=>document.getElementById('msg').classList.remove('success'), 1500);
  sfxPickup();
  activeMission.giver.active = true;
  activeMission = null; showMission();
}
function failMission() {
  if (!activeMission) return;
  showMsg('MISSION FAILED', 120);
  document.getElementById('msg').classList.add('fail');
  setTimeout(()=>document.getElementById('msg').classList.remove('fail'), 1500);
  if (activeMission.target) activeMission.target.mark = false;
  activeMission.giver.active = true;
  activeMission = null; showMission();
}

const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase(); keys[k] = true;
  if (['w','a','s','d',' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

const msgEl = document.getElementById('msg');
let msgTimer = 0;
function showMsg(text, dur=90) { msgEl.textContent = text; msgEl.classList.add('show'); msgTimer = dur; }

function updateHUD() {
  document.getElementById('cash').textContent = '$' + player.cash;
  document.getElementById('kills').textContent = player.kills;
  document.getElementById('health').textContent = Math.max(0, Math.floor(player.health));
  document.getElementById('armor').textContent = Math.max(0, Math.floor(player.armor));
  document.getElementById('weapon').textContent = WEAPONS[player.weapon].name;
  const a = player.ammo[player.weapon];
  document.getElementById('ammo').textContent = a === Infinity ? '∞' : a;
  document.getElementById('stars').textContent = '★'.repeat(player.wanted) + '☆'.repeat(5 - player.wanted);
}

function spawnBlood(x, y, n=12) {
  for (let i = 0; i < n; i++) { const a = Math.random()*Math.PI*2, s = 1 + Math.random()*3;
    particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 20+Math.random()*20, color: '#aa0000', r: 2+Math.random()*2}); }
}
function spawnExplosion(x, y) {
  sfxExplode();
  for (let i = 0; i < 40; i++) { const a = Math.random()*Math.PI*2, s = 2 + Math.random()*6;
    particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 30+Math.random()*30, color: Math.random()>0.5?'#ff6600':'#ffcc00', r: 3+Math.random()*4}); }
  for (const p of peds) { if (!p.dead && Math.hypot(p.x-x, p.y-y) < 60) { p.dead = true; spawnBlood(p.x, p.y); player.kills++; player.cash += 50; addWanted(1); } }
  for (const c of cops) { if (!c.dead && Math.hypot(c.x-x, c.y-y) < 60) { c.dead = true; spawnBlood(c.x, c.y); player.kills++; player.cash += 100; addWanted(1); } }
  if (!player.inCar && Math.hypot(player.x-x, player.y-y) < 60) damagePlayer(40);
}
function spawnSpark(x, y) {
  for (let i = 0; i < 4; i++) { const a = Math.random()*Math.PI*2;
    particles.push({x, y, vx: Math.cos(a)*2, vy: Math.sin(a)*2, life: 10, color: '#ffff00', r: 1.5}); }
}

function addWanted(n) { player.wanted = Math.min(5, player.wanted + n); }
function damagePlayer(amt) {
  if (player.armor > 0) { const abs = Math.min(player.armor, amt*0.7); player.armor -= abs; amt -= abs; }
  player.health -= amt;
  if (player.health <= 0) die();
}

function doAttack() {
  if (player.attackCooldown > 0) return;
  const w = WEAPONS[player.weapon];
  if (w.ammo !== Infinity && player.ammo[player.weapon] <= 0) { player.weapon = 'fist'; return; }
  const px = player.inCar ? player.inCar.x : player.x;
  const py = player.inCar ? player.inCar.y : player.y;
  const pa = player.inCar ? player.inCar.angle : player.angle;
  if (w.melee) {
    sfxPunch(); player.meleeFlash = 6;
    for (const p of peds) {
      if (p.dead) continue;
      const dx = p.x - px, dy = p.y - py;
      if (dx*dx + dy*dy < w.range*w.range) {
        const ang = Math.atan2(dy, dx);
        if (Math.abs(((ang - pa + Math.PI*3) % (Math.PI*2)) - Math.PI) > Math.PI - 0.7) {
          p.health -= w.dmg; spawnBlood(p.x, p.y, 4);
          if (p.gang) p.hostile = true;
          if (p.health <= 0) { p.dead = true; player.kills++; player.cash += 50; addWanted(1); spawnBlood(p.x, p.y); panicNear(p.x, p.y); }
        }
      }
    }
    for (const c of cops) {
      if (c.dead) continue;
      const dx = c.x - px, dy = c.y - py;
      if (dx*dx + dy*dy < w.range*w.range) {
        c.health -= w.dmg; spawnBlood(c.x, c.y, 4);
        if (c.health <= 0) { c.dead = true; player.kills++; player.cash += 100; addWanted(1); spawnBlood(c.x, c.y); }
      }
    }
  } else {
    sfxShoot();
    const pellets = w.pellets || 1;
    for (let i = 0; i < pellets; i++) {
      const spread = (Math.random()-0.5)*w.spread*2;
      const a = pa + spread;
      bullets.push({ x: px + Math.cos(pa)*20, y: py + Math.sin(pa)*20,
        vx: Math.cos(a)*w.speed, vy: Math.sin(a)*w.speed,
        life: w.life, from: 'player', dmg: w.dmg });
    }
    if (w.ammo !== Infinity) player.ammo[player.weapon]--;
    if (player.ammo[player.weapon] <= 0 && !w.melee) player.weapon = 'fist';
  }
  player.attackCooldown = w.cooldown;
}

function panicNear(x, y) {
  for (const q of peds) {
    if (q.dead) continue;
    const dx = q.x - x, dy = q.y - y;
    if (dx*dx + dy*dy < 200*200) { if (q.gang) q.hostile = true; else q.fleeing = true; }
  }
}

function spawnCop() {
  const a = Math.random()*Math.PI*2, d = 500 + Math.random()*400;
  cops.push({ x: player.x + Math.cos(a)*d, y: player.y + Math.sin(a)*d,
    r: 7, angle: 0, color: '#1a1a6e', skin: '#f5d0a9',
    speed: 2.2, shootCooldown: 0, health: 60, dead: false });
  sfxSiren();
}

function update() {
  if (player.dead) {
    player.respawnTimer--;
    if (keys['r'] || player.respawnTimer <= 0) respawn();
    updateParticles(); return;
  }
  if (player.attackCooldown > 0) player.attackCooldown--;
  if (player.meleeFlash > 0) player.meleeFlash--;
  if (msgTimer > 0) { msgTimer--; if (msgTimer === 0) { msgEl.classList.remove('show'); msgEl.classList.remove('success'); msgEl.classList.remove('fail'); } }

  if (keys['1']) player.weapon = 'fist';
  if (keys['2'] && player.ammo.pistol > 0) player.weapon = 'pistol';
  if (keys['3'] && player.ammo.smg > 0) player.weapon = 'smg';
  if (keys['4'] && player.ammo.shotgun > 0) player.weapon = 'shotgun';
  if (keys['m']) { keys['m'] = false; tryAcceptMission(); }

  if (keys['e']) {
    keys['e'] = false;
    if (player.inCar) {
      const c = player.inCar;
      player.x = c.x + Math.cos(c.angle + Math.PI/2)*20;
      player.y = c.y + Math.sin(c.angle + Math.PI/2)*20;
      player.angle = c.angle;
      c.driver = null; c.ai = false; c.speed *= 0.3;
      player.inCar = null;
    } else {
      for (const v of vehicles) {
        if (v.wrecked) continue;
        const dx = v.x - player.x, dy = v.y - player.y;
        if (dx*dx + dy*dy < 40*40) {
          if (v.ai && Math.random() < 0.3) addWanted(1);
          v.driver = 'player'; v.ai = false; v.parked = false; player.inCar = v;
          showMsg('PRETTY THEFT AUTO', 45); sfxPickup(); break;
        }
      }
    }
  }

  if (player.inCar) {
    const c = player.inCar;
    const accel = (keys['w']||keys['arrowup']) ? 0.25 : (keys['s']||keys['arrowdown']) ? -0.2 : 0;
    c.speed += accel; c.speed *= 0.97;
    c.speed = Math.max(-5, Math.min(10, c.speed));
    const turn = (keys['a']||keys['arrowleft']) ? -0.04 : (keys['d']||keys['arrowright']) ? 0.04 : 0;
    c.angle += turn * (c.speed/8);
    const nx = c.x + Math.cos(c.angle)*c.speed, ny = c.y + Math.sin(c.angle)*c.speed;
    const b = collidesBuilding(nx, ny, 16);
    if (b) { c.speed *= -0.3; c.health -= Math.abs(c.speed)*2; spawnSpark(nx, ny); }
    else { c.x = nx; c.y = ny; }
    for (const p of peds) {
      if (p.dead) continue;
      const dx = p.x - c.x, dy = p.y - c.y;
      if (dx*dx + dy*dy < 20*20 && Math.abs(c.speed) > 2) {
        p.dead = true; player.kills++; player.cash += 50; addWanted(1);
        spawnBlood(p.x, p.y, 20); showMsg('HIT AND RUN +$50', 45); panicNear(p.x, p.y);
      }
    }
    for (const cop of cops) {
      if (cop.dead) continue;
      const dx = cop.x - c.x, dy = cop.y - c.y;
      if (dx*dx + dy*dy < 20*20 && Math.abs(c.speed) > 2) {
        cop.dead = true; player.kills++; player.cash += 100; addWanted(1);
        spawnBlood(cop.x, cop.y, 20);
      }
    }
    if (c.health <= 0) {
      spawnExplosion(c.x, c.y); c.wrecked = true;
      player.inCar = null; player.x = c.x; player.y = c.y;
      damagePlayer(40); showMsg('VEHICLE DESTROYED', 60);
    }
    if (player.inCar) { player.x = c.x; player.y = c.y; player.angle = c.angle; }
  } else {
    const spd = keys['shift'] ? 3.2 : 2;
    let dx = 0, dy = 0;
    if (keys['w']||keys['arrowup']) dy -= 1;
    if (keys['s']||keys['arrowdown']) dy += 1;
    if (keys['a']||keys['arrowleft']) dx -= 1;
    if (keys['d']||keys['arrowright']) dx += 1;
    if (dx || dy) {
      const l = Math.hypot(dx, dy); dx /= l; dy /= l;
      player.angle = Math.atan2(dy, dx);
      const nx = player.x + dx*spd, ny = player.y + dy*spd;
      if (!collidesBuilding(nx, ny, player.r)) { player.x = nx; player.y = ny; }
      else if (!collidesBuilding(nx, player.y, player.r)) player.x = nx;
      else if (!collidesBuilding(player.x, ny, player.r)) player.y = ny;
    }
  }
  player.x = Math.max(0, Math.min(WORLD, player.x));
  player.y = Math.max(0, Math.min(WORLD, player.y));

  if (keys[' ']) doAttack();

  for (let i = pickups.length-1; i >= 0; i--) {
    const p = pickups[i];
    const dx = p.x - player.x, dy = p.y - player.y;
    if (dx*dx + dy*dy < 20*20) {
      if (p.type === 'health') { player.health = Math.min(100, player.health + 50); showMsg('HEALTH +50', 40); }
      else if (p.type === 'armor') { player.armor = Math.min(100, player.armor + 50); showMsg('ARMOR +50', 40); }
      else if (p.type === 'cash') { const amt = 50+Math.floor(Math.random()*200); player.cash += amt; showMsg('+$'+amt, 40); }
      else { player.ammo[p.type] += p.dropAmmo; player.weapon = p.type; showMsg(p.type.toUpperCase()+' +'+p.dropAmmo, 40); }
      sfxPickup(); pickups.splice(i, 1);
    }
  }
  if (Math.random() < 0.005 && pickups.length < 40) {
    let x, y, tries = 0;
    do { x = Math.random()*WORLD; y = Math.random()*WORLD; tries++; }
    while (collidesBuilding(x, y, 10) && tries < 20);
    const t = pickupTypes[Math.floor(Math.random()*pickupTypes.length)];
    pickups.push({ x, y, ...t });
  }

  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || collidesBuilding(b.x, b.y, 2)) { bullets.splice(i,1); continue; }
    if (b.from === 'player') {
      let hit = false;
      for (const p of peds) {
        if (p.dead) continue;
        const dx = p.x - b.x, dy = p.y - b.y;
        if (dx*dx + dy*dy < 64) {
          p.health -= b.dmg; spawnBlood(p.x, p.y, 4);
          if (p.gang) p.hostile = true;
          if (p.health <= 0) { p.dead = true; player.kills++; player.cash += 50; addWanted(1); spawnBlood(p.x, p.y); panicNear(p.x, p.y); }
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
      for (const cop of cops) {
        if (cop.dead) continue;
        const dx = cop.x - b.x, dy = cop.y - b.y;
        if (dx*dx + dy*dy < 64) {
          cop.health -= b.dmg; spawnBlood(cop.x, cop.y, 4);
          if (cop.health <= 0) { cop.dead = true; player.kills++; player.cash += 100; addWanted(1); spawnBlood(cop.x, cop.y, 20); }
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
      for (const v of vehicles) {
        if (v.wrecked) continue;
        const dx = v.x - b.x, dy = v.y - b.y;
        if (dx*dx + dy*dy < 400) {
          v.health -= b.dmg*0.5; spawnSpark(b.x, b.y);
          if (v.health <= 0) { spawnExplosion(v.x, v.y); v.wrecked = true; }
          hit = true; break;
        }
      }
      if (hit) { bullets.splice(i,1); continue; }
    } else {
      const dx = player.x - b.x, dy = player.y - b.y;
      if (dx*dx + dy*dy < 80) { damagePlayer(b.dmg); spawnBlood(player.x, player.y, 3); bullets.splice(i,1); continue; }
    }
  }

  for (const p of peds) {
    if (p.dead) continue;
    p.walkTimer--;
    if (p.hostile) {
      const dx = player.x - p.x, dy = player.y - p.y;
      const d = Math.hypot(dx, dy) || 1;
      p.angle = Math.atan2(dy, dx);
      if (d > 150) {
        const nx = p.x + (dx/d)*1.2, ny = p.y + (dy/d)*1.2;
        if (!collidesBuilding(nx, ny, p.r)) { p.x = nx; p.y = ny; }
      }
      p.shootCooldown--;
      if (p.shootCooldown <= 0 && d < 300) {
        bullets.push({ x: p.x + Math.cos(p.angle)*10, y: p.y + Math.sin(p.angle)*10,
          vx: Math.cos(p.angle)*10 + (Math.random()-0.5)*2,
          vy: Math.sin(p.angle)*10 + (Math.random()-0.5)*2,
          life: 50, from: 'ped', dmg: 8 });
        p.shootCooldown = 50;
      }
    } else if (p.fleeing) {
      const dx = p.x - player.x, dy = p.y - player.y;
      const d = Math.hypot(dx, dy) || 1;
      p.vx = (dx/d)*2; p.vy = (dy/d)*2;
      p.angle = Math.atan2(p.vy, p.vx);
      const nx = p.x + p.vx, ny = p.y + p.vy;
      if (!collidesBuilding(nx, ny, p.r)) { p.x = nx; p.y = ny; }
    } else {
      if (p.walkTimer <= 0) {
        p.angle = Math.random()*Math.PI*2;
        p.vx = Math.cos(p.angle)*0.6; p.vy = Math.sin(p.angle)*0.6;
        p.walkTimer = 60 + Math.random()*120;
      }
      const nx = p.x + p.vx, ny = p.y + p.vy;
      if (!collidesBuilding(nx, ny, p.r)) { p.x = nx; p.y = ny; } else p.walkTimer = 0;
    }
  }

  for (const v of vehicles) {
    if (v.wrecked || !v.ai) continue;
    v.turnTimer--;
    if (v.turnTimer <= 0) {
      if (!isOnRoad(v.x, v.y)) v.angle += Math.PI/2;
      else if (Math.random() < 0.1) v.angle += (Math.random()-0.5)*1.5;
      v.turnTimer = 30 + Math.random()*60;
    }
    v.speed = Math.min(v.maxSpeed, v.speed + 0.1);
    const nx = v.x + Math.cos(v.angle)*v.speed, ny = v.y + Math.sin(v.angle)*v.speed;
    if (collidesBuilding(nx, ny, 16)) { v.angle += Math.PI/2 + (Math.random()-0.5); v.speed *= 0.3; }
    else { v.x = nx; v.y = ny; }
  }

  if (player.wanted > 0) {
    const target = player.wanted * 2;
    const alive = cops.filter(c=>!c.dead).length;
    if (alive < target && Math.random() < 0.02*player.wanted) spawnCop();
  }
  for (const cop of cops) {
    if (cop.dead) continue;
    const dx = player.x - cop.x, dy = player.y - cop.y;
    const d = Math.hypot(dx, dy) || 1;
    cop.angle = Math.atan2(dy, dx);
    if (d > 120) {
      const nx = cop.x + (dx/d)*cop.speed, ny = cop.y + (dy/d)*cop.speed;
      if (!collidesBuilding(nx, ny, cop.r)) { cop.x = nx; cop.y = ny; }
      else { cop.x += (dx/d)*cop.speed*0.3; cop.y += (dy/d)*cop.speed*0.3; }
    } else {
      cop.shootCooldown--;
      if (cop.shootCooldown <= 0) {
        bullets.push({ x: cop.x + Math.cos(cop.angle)*10, y: cop.y + Math.sin(cop.angle)*10,
          vx: Math.cos(cop.angle)*10 + (Math.random()-0.5)*2,
          vy: Math.sin(cop.angle)*10 + (Math.random()-0.5)*2,
          life: 50, from: 'cop', dmg: 10 });
        cop.shootCooldown = 40; sfxShoot();
      }
    }
  }

  if (player.wanted > 0 && Math.random() < 0.0008) player.wanted--;

  if (activeMission) {
    if (activeMission.timer !== undefined) {
      activeMission.timer--;
      if (activeMission.timer % 30 === 0) showMission();
      if (activeMission.timer <= 0) failMission();
    }
    if (activeMission && activeMission.check()) completeMission();
  }

  updateParticles();
  updateHUD();
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function die() {
  player.dead = true; player.respawnTimer = 120;
  showMsg('WASTED', 300); msgEl.classList.add('fail');
  if (activeMission) failMission();
}
function respawn() {
  player.dead = false; player.health = 100; player.armor = 0; player.wanted = 0;
  player.x = BLOCK + ROAD_W/2; player.y = BLOCK + ROAD_W/2;
  player.inCar = null; cops.length = 0;
  msgEl.classList.remove('show'); msgEl.classList.remove('fail');
}

function render() {
  ctx.fillStyle = '#1e3a2f'; ctx.fillRect(0,0,W,H);
  const camX = player.x - W/2, camY = player.y - H/2;
  ctx.save(); ctx.translate(-camX, -camY);

  for (const g of GANGS) {
    if (g.bounds[2] < camX || g.bounds[0] > camX+W || g.bounds[3] < camY || g.bounds[1] > camY+H) continue;
    ctx.fillStyle = g.tint;
    ctx.fillRect(g.bounds[0], g.bounds[1], g.bounds[2]-g.bounds[0], g.bounds[3]-g.bounds[1]);
  }

  ctx.fillStyle = '#2a2e3a';
  const startBX = Math.floor(camX / BLOCK) * BLOCK, startBY = Math.floor(camY / BLOCK) * BLOCK;
  for (let x = startBX; x < camX + W + BLOCK; x += BLOCK) ctx.fillRect(x - ROAD_W/2, camY - 20, ROAD_W, H + 40);
  for (let y = startBY; y < camY + H + BLOCK; y += BLOCK) ctx.fillRect(camX - 20, y - ROAD_W/2, W + 40, ROAD_W);
  ctx.strokeStyle = '#f4d03f'; ctx.lineWidth = 2; ctx.setLineDash([12, 16]);
  for (let x = startBX; x < camX + W + BLOCK; x += BLOCK) { ctx.beginPath(); ctx.moveTo(x, camY - 20); ctx.lineTo(x, camY + H + 20); ctx.stroke(); }
  for (let y = startBY; y < camY + H + BLOCK; y += BLOCK) { ctx.beginPath(); ctx.moveTo(camX - 20, y); ctx.lineTo(camX + W + 20, y); ctx.stroke(); }
  ctx.setLineDash([]);

  for (const b of buildings) {
    if (b.x + b.w < camX || b.x > camX + W || b.y + b.h < camY || b.y > camY + H) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(b.x + 4, b.y + 4, b.w, b.h);
    ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = 'rgba(255,230,150,0.5)';
    for (let wy = b.y + 6; wy < b.y + b.h - 4; wy += 10) {
      for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 10) {
        if (((wx+wy)^(b.x|0))%3 === 0) ctx.fillRect(wx, wy, 4, 4);
      }
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 1.5; ctx.strokeRect(b.x, b.y, b.w, b.h);
  }

  for (const p of pickups) {
    if (p.x < camX-10 || p.x > camX+W+10 || p.y < camY-10 || p.y > camY+H+10) continue;
    const pulse = 1 + 0.2*Math.sin(Date.now()/200);
    ctx.save(); ctx.translate(p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(0, 0, 14*pulse, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    if (p.type === 'pistol' || p.type === 'smg' || p.type === 'shotgun') ctx.fillRect(-8, -3, 16, 6);
    else if (p.type === 'health') { ctx.fillRect(-6, -2, 12, 4); ctx.fillRect(-2, -6, 4, 12); }
    else if (p.type === 'armor') { ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(6,-3); ctx.lineTo(4,6); ctx.lineTo(-4,6); ctx.lineTo(-6,-3); ctx.closePath(); ctx.fill(); }
    else if (p.type === 'cash') { ctx.fillRect(-7, -4, 14, 8); ctx.fillStyle='#000'; ctx.font='bold 10px monospace'; ctx.textAlign='center'; ctx.fillText('$', 0, 4); }
    ctx.restore();
  }

  for (const m of missionGivers) {
    if (!m.active) continue;
    if (m.x < camX-20 || m.x > camX+W+20 || m.y < camY-20 || m.y > camY+H+20) continue;
    const pulse = 1 + 0.3*Math.sin(Date.now()/300);
    ctx.save(); ctx.translate(m.x, m.y);
    ctx.fillStyle = 'rgba(255,46,136,0.3)'; ctx.beginPath(); ctx.arc(0, 0, 20*pulse, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff2e88'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.fillText('?', 0, 5);
    ctx.restore();
  }

  if (activeMission && activeMission.dropoff) {
    const d = activeMission.dropoff;
    if (d.x > camX-20 && d.x < camX+W+20 && d.y > camY-20 && d.y < camY+H+20) {
      const pulse = 1 + 0.3*Math.sin(Date.now()/300);
      ctx.fillStyle = 'rgba(0,240,255,0.3)';
      ctx.beginPath(); ctx.arc(d.x, d.y, 30*pulse, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#00f0ff'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(d.x, d.y, 30, 0, Math.PI*2); ctx.stroke();
    }
  }

  for (const p of peds) {
    if (!p.dead) continue;
    if (p.x < camX-10 || p.x > camX+W+10 || p.y < camY-10 || p.y > camY+H+10) continue;
    ctx.fillStyle = '#660000'; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color; ctx.fillRect(p.x-4, p.y-4, 8, 8);
  }
  for (const v of vehicles) {
    if (!v.wrecked) continue;
    if (v.x < camX-30 || v.x > camX+W+30 || v.y < camY-30 || v.y > camY+H+30) continue;
    ctx.save(); ctx.translate(v.x, v.y); ctx.rotate(v.angle);
    ctx.fillStyle = '#333'; ctx.fillRect(-v.w/2, -v.h/2, v.w, v.h);
    ctx.fillStyle = '#000';
    for (let i = 0; i < 5; i++) ctx.fillRect(-v.w/2 + i*6, -v.h/2 + (i%2)*6, 4, 4);
    ctx.restore();
  }

  for (const v of vehicles) {
    if (v.wrecked) continue;
    if (v.x < camX-40 || v.x > camX+W+40 || v.y < camY-40 || v.y > camY+H+40) continue;
    ctx.save(); ctx.translate(v.x, v.y); ctx.rotate(v.angle);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-v.w/2 + 2, -v.h/2 + 2, v.w, v.h);
    ctx.fillStyle = v.color; ctx.fillRect(-v.w/2, -v.h/2, v.w, v.h);
    ctx.fillStyle = 'rgba(100,180,220,0.7)'; ctx.fillRect(2, -v.h/2+2, 8, v.h-4);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.strokeRect(-v.w/2, -v.h/2, v.w, v.h);
    ctx.restore();
  }

  for (const p of peds) {
    if (p.dead) continue;
    if (p.x < camX-10 || p.x > camX+W+10 || p.y < camY-10 || p.y > camY+H+10) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(p.x+1, p.y+1, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    if (p.gang) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke(); }
    ctx.fillStyle = p.skin; ctx.beginPath(); ctx.arc(p.x, p.y, p.r-3, 0, Math.PI*2); ctx.fill();
    if (p.mark) {
      ctx.strokeStyle = '#ff2e88'; ctx.lineWidth = 2;
      const ps = 1 + 0.3*Math.sin(Date.now()/200);
      ctx.beginPath(); ctx.arc(p.x, p.y, 16*ps, 0, Math.PI*2); ctx.stroke();
    }
  }

  for (const cop of cops) {
    if (cop.dead) continue;
    if (cop.x < camX-20 || cop.x > camX+W+20 || cop.y < camY-20 || cop.y > camY+H+20) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(cop.x+1, cop.y+1, cop.r+1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = cop.color; ctx.beginPath(); ctx.arc(cop.x, cop.y, cop.r+1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = cop.skin; ctx.beginPath(); ctx.arc(cop.x, cop.y, cop.r-2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd700'; ctx.fillRect(cop.x-1, cop.y-1, 2, 2);
  }

  if (!player.inCar) {
    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(1,1,player.r+1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff2e88'; ctx.beginPath(); ctx.arc(0,0,player.r+1,0,Math.PI*2); ctx.fill();
    if (player.armor > 0) { ctx.strokeStyle = '#b967ff'; ctx.lineWidth = 2; ctx.stroke(); }
    ctx.fillStyle = '#f5d0a9'; ctx.beginPath(); ctx.arc(0,0,player.r-2,0,Math.PI*2); ctx.fill();
    const w = WEAPONS[player.weapon];
    if (w.melee) { if (player.meleeFlash > 0) { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(14,0,8,0,Math.PI*2); ctx.fill(); } }
    else {
      ctx.fillStyle = '#111';
      const len = player.weapon === 'shotgun' ? 14 : player.weapon === 'smg' ? 12 : 10;
      ctx.fillRect(4, -2, len, 4);
    }
    ctx.restore();
  }

  for (const b of bullets) {
    ctx.fillStyle = b.from === 'player' ? '#ffff66' : '#ff6666';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2); ctx.fill();
  }

  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life/40);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  const g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)/3, W/2, H/2, Math.max(W,H)/1.2);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  const gang = gangAt(player.x, player.y);
  ctx.fillStyle = gang.color;
  ctx.font = 'bold 11px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('» ' + gang.name + ' TURF «', W/2, H - 12);

  mctx.fillStyle = '#000'; mctx.fillRect(0,0,160,160);
  const scale = 160 / WORLD;
  for (const gg of GANGS) {
    mctx.fillStyle = gg.color; mctx.globalAlpha = 0.15;
    mctx.fillRect(gg.bounds[0]*scale, gg.bounds[1]*scale, (gg.bounds[2]-gg.bounds[0])*scale, (gg.bounds[3]-gg.bounds[1])*scale);
  }
  mctx.globalAlpha = 1;
  mctx.fillStyle = 'rgba(60,60,80,0.6)';
  for (let x = 0; x < WORLD; x += BLOCK) mctx.fillRect(x*scale, 0, ROAD_W*scale, 160);
  for (let y = 0; y < WORLD; y += BLOCK) mctx.fillRect(0, y*scale, 160, ROAD_W*scale);
  for (const m of missionGivers) { if (m.active) { mctx.fillStyle = '#ff2e88'; mctx.fillRect(m.x*scale-2, m.y*scale-2, 4, 4); } }
  if (activeMission) {
    if (activeMission.target && !activeMission.target.dead) { mctx.fillStyle = '#ff2e88'; mctx.fillRect(activeMission.target.x*scale-2, activeMission.target.y*scale-2, 4, 4); }
    if (activeMission.dropoff) { mctx.fillStyle = '#00f0ff'; mctx.fillRect(activeMission.dropoff.x*scale-3, activeMission.dropoff.y*scale-3, 6, 6); }
  }
  for (const cop of cops) { if (!cop.dead) { mctx.fillStyle = '#00aaff'; mctx.fillRect(cop.x*scale-1, cop.y*scale-1, 3, 3); } }
  mctx.fillStyle = '#ff2e88'; mctx.fillRect(player.x*scale-2, player.y*scale-2, 4, 4);
}

function loop() { update(); render(); requestAnimationFrame(loop); }

showMsg('WELCOME TO BROWSER CITY', 120);
loop();
</script>
</body>
</html>
